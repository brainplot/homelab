- become: true
  block:
    - name: Disable wifi
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: dtoverlay=disable-wifi
        insertafter: '# /boot/firmware/overlays/README'
      notify: Reboot

    - name: Disable bluetooth
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: dtoverlay=disable-bt
        insertafter: dtoverlay=disable-wifi
      notify: Reboot

- name: Disable swap
  become: true
  block:
    - name: Ensure drop-in directory exists
      ansible.builtin.file:
        path: /etc/rpi/swap.conf.d
        state: directory
        mode: '0755'
      register: swap_conf_d

    - name: Configure rpi-swap mechanism none
      ansible.builtin.copy:
        dest: '{{ swap_conf_d.path }}/99-disable-swap.conf'
        mode: '0644'
        content: |
          [Main]
          Mechanism=none
      notify: Reboot

- name: Configure zram
  become: true
  ansible.builtin.template:
    src: zram-generator.conf.j2
    dest: /etc/systemd/zram-generator.conf
    mode: '0644'
  notify: Reboot
